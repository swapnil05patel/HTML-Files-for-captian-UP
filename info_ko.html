<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome Journey</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(180deg,#081226,#132c5b);color:#fff}
.hero{padding:20px 12px;text-align:center;background:linear-gradient(135deg,#1e40af,#312e81)}
.hero h1{margin:0;font-size:20px;word-break:break-word}
.hero p{opacity:.9;font-size:12px;margin:8px 0 0 0}
.card{background:rgba(255,255,255,.08);margin:8px;border-radius:12px;padding:12px;backdrop-filter:blur(6px)}
.card h2{font-size:14px;margin:0 0 8px 0}
.card p{font-size:12px;margin:0;line-height:1.4}
.card ol{font-size:12px;margin:8px 0;padding-left:20px}
.reward{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
.badge{background:#243b6b;padding:6px 10px;border-radius:999px;font-size:11px;white-space:nowrap}
details{background:#102347;padding:8px;border-radius:8px;margin:6px 0;font-size:12px}
details summary{cursor:pointer;font-weight:bold;outline:none}
@media (min-width:300px) and (max-width:450px){
body{font-size:12px}
.hero{padding:16px 10px}
.hero h1{font-size:18px}
.hero p{font-size:11px}
.card{margin:6px;padding:10px}
.card h2{font-size:13px;margin:0 0 6px 0}
.card p{font-size:11px}
.badge{padding:5px 8px;font-size:10px}
details{padding:6px;margin:4px 0}
}
@media (max-width:350px){
.hero{padding:12px 8px}
.hero h1{font-size:16px}
.hero p{font-size:10px}
.card{margin:4px;padding:8px}
.card h2{font-size:12px}
.card p{font-size:10px}
.card ol{font-size:10px}
.badge{padding:4px 6px;font-size:9px}
details{padding:5px;margin:3px 0;font-size:10px}
}
</style>
</head>
<body>
<div class="hero">
<h1>🏆 환영 여행</h1>
<p>한국어 버전</p>
</div>

<div class="card">
<h2>소개</h2>
<p>미션을 완료하고 포인트를 획득하며 배지를 잠금 해제하고 순위표를 오릅니다.</p>
</div>

<div class="card">
<h2>작동 방식</h2>
<ol>
<li>이벤트에 참가</li>
<li>미션 완료</li>
<li>포인트 획득</li>
<li>보상 잠금 해제</li>
</ol>
</div>

<div class="card">
<h2>보상</h2>
<div class="reward">
<div class="badge">🥇 금상</div>
<div class="badge">🥈 은상</div>
<div class="badge">🥉 동상</div>
</div>
</div>

<div class="card">
<h2>자주 묻는 질문</h2>
<details><summary>환영 여행이란 무엇인가요?</summary><p>미션 기반 이벤트입니다.</p></details>
<details><summary>포인트는 어떻게 획득하나요?</summary><p>미션을 완료하세요.</p></details>
<details><summary>누가 참가할 수 있나요?</summary><p>모든 자격 있는 사용자.</p></details>
</div>

<div class="card">
<h2>지원</h2>
<p>도움을 받으려면 지원팀에 문의하세요.</p>
</div>
</body>
</html>
